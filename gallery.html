<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Flickgames</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root {
      --muted-foreground: #666;
      --panel: #0b0b0b;
      --panel-alt: #111;
      --text: #eee;
      --bg: #000;
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .gallery-page-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: max(16px, env(safe-area-inset-top)) 16px 14px;
      border-bottom: 2px solid var(--muted-foreground);
      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(12px);
    }
    .gallery-page-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .gallery-page-title {
      margin: 0;
      min-width: 0;
      flex: 1 1 auto;
      font-size: 24px;
      font-weight: 700;
    }
    .gallery-page-body {
      padding: 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }
    .gallery-card {
      background: var(--panel);
      border: 2px solid var(--muted-foreground);
      border-radius: 12px;
      padding: 10px;
      box-sizing: border-box;
      min-width: 0;
    }
    .gallery-card.gallery-tile {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 176px;
      text-align: center;
      cursor: pointer;
    }
    .gallery-tile-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .gallery-tile-plus {
      font-size: 48px;
      line-height: 1;
      font-weight: 700;
    }
    .gallery-thumb {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      image-rendering: pixelated;
      border: 1px solid #333;
      border-radius: 8px;
      background: #000;
      cursor: pointer;
    }
    .gallery-title {
      margin-top: 8px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gallery-time {
      margin-top: 4px;
      font-size: 12px;
      color: #aaa;
    }
    .gallery-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .gallery-btn {
      border: 2px solid var(--muted-foreground);
      background: var(--panel-alt);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .gallery-btn[disabled] {
      opacity: 0.45;
      cursor: default;
    }
    .gallery-share-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.7);
    }
    .gallery-share-overlay.visible {
      display: flex;
    }
    .gallery-share-sheet {
      width: min(420px, 100%);
      background: var(--panel-alt);
      border: 2px solid var(--muted-foreground);
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
    }
    .gallery-share-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 700;
    }
    .gallery-share-sheet .gallery-btn {
      width: 100%;
      margin-bottom: 8px;
      text-align: left;
    }
    .gallery-toast {
      position: fixed;
      left: 50%;
      bottom: max(20px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 50;
      display: none;
      max-width: min(460px, calc(100vw - 24px));
      border: 1px solid var(--muted-foreground);
      border-radius: 999px;
      background: #1a1a1a;
      color: var(--text);
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
      box-sizing: border-box;
    }
    .gallery-toast.visible {
      display: block;
    }
    .gallery-page-header-row .gallery-btn {
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <header class="gallery-page-header">
    <div class="gallery-page-header-row">
      <h1 class="gallery-page-title">Flickgame Gallery</h1>
      <button type="button" id="gallery-import-btn" class="gallery-btn">Import...</button>
    </div>
  </header>
  <main class="gallery-page-body">
    <div id="gallery-grid" class="gallery-grid"></div>
  </main>
  <div id="gallery-share-overlay" class="gallery-share-overlay" aria-hidden="true">
    <div id="gallery-share-sheet" class="gallery-share-sheet"></div>
  </div>
  <div id="gallery-toast" class="gallery-toast"></div>
  <input type="file" id="gallery-import-input" accept=".html,.json,.txt,text/plain" style="display:none">

  <script src="FileSaver.js"></script>
  <script src="gallery_store.js"></script>
  <script src="flickgame_share.js"></script>
  <script src="flickgame_vanilla.js"></script>
  <script src="gallery_page.js"></script>
</body>
</html>
