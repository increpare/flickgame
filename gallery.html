<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Flickgames</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script>
    (function () {
      try {
        if (window.FLICKGAME_HOST === 'ios-app' || window.FLICKGAME_IOS_APP) {
          document.documentElement.setAttribute('data-ios-app', 'true');
        }
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --muted-foreground: #666;
      --panel-alt: #111;
      --text: #eee;
      --bg: #000;
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }
    .gallery-page-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: max(16px, env(safe-area-inset-top)) 16px 14px;
      border-bottom: 2px solid var(--muted-foreground);
      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(12px);
    }
    .gallery-page-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .gallery-page-title {
      margin: 0;
      min-width: 0;
      flex: 1 1 auto;
      font-size: 24px;
      font-weight: 700;
    }
    .gallery-page-body {
      padding: 16px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (min-width: 500px) {
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      }
    }
    .gallery-card {
      --bg: #000;
      --ink: #fff;
      background: var(--bg);
      color: var(--ink);
      border: 1px solid color-mix(in srgb, var(--ink) 22%, transparent);
      border-radius: 12px;
      padding: 8px;
      box-sizing: border-box;
      overflow: hidden;
      min-width: 0;
    }
    .gallery-card.gallery-tile {
      background: #0a0a0a;
      color: #888;
      border: 1px dashed #444;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .gallery-thumb-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
    }
    .gallery-thumb-frame {
      max-width: 100%;
      max-height: 100%;
      border: 1px solid color-mix(in srgb, var(--ink) 40%, transparent);
      box-sizing: border-box;
      display: block;
    }
    .gallery-thumb {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }
    .gallery-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      color: var(--ink);
      opacity: 0.85;
    }
    .gallery-play svg {
      width: 38px;
      height: 38px;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.4));
    }
    .gallery-x {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      color: #ff5c5c;
      border: none;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .gallery-title {
      font-size: 13px;
      font-weight: 600;
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ink);
    }
    .gallery-time {
      font-size: 10px;
      margin-top: 2px;
      color: var(--ink);
      opacity: 0.65;
    }
    .gallery-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      margin-top: 7px;
    }
    .gallery-ibtn {
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, var(--ink) 30%, transparent);
      background: transparent;
      color: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .gallery-ibtn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    .gallery-ibtn[disabled],
    .gallery-x[disabled] {
      opacity: 0.45;
      cursor: default;
    }
    .gallery-tile-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .gallery-tile-plus {
      font-size: 48px;
      line-height: 1;
      font-weight: 700;
    }
    .gallery-btn {
      border: 2px solid var(--muted-foreground);
      background: var(--panel-alt);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .gallery-btn[disabled] {
      opacity: 0.45;
      cursor: default;
    }
    .gallery-share-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.7);
    }
    .gallery-share-overlay.visible {
      display: flex;
    }
    .gallery-share-sheet {
      width: min(420px, 100%);
      background: var(--panel-alt);
      border: 2px solid var(--muted-foreground);
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
    }
    .gallery-share-title {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 700;
    }
    .gallery-share-sheet .gallery-btn {
      width: 100%;
      margin-bottom: 8px;
      text-align: left;
    }
    .gallery-toast {
      position: fixed;
      left: 50%;
      bottom: max(20px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 50;
      display: none;
      max-width: min(460px, calc(100vw - 24px));
      border: 1px solid var(--muted-foreground);
      border-radius: 999px;
      background: #1a1a1a;
      color: var(--text);
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
      box-sizing: border-box;
    }
    .gallery-toast.visible {
      display: block;
    }
    .gallery-page-header-row .gallery-btn {
      flex: 0 0 auto;
    }

    html[data-ios-app="true"] {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      height: 100%;
    }
    html[data-ios-app="true"] body {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    html[data-ios-app="true"] .gallery-page-header {
      position: relative;
      flex: 0 0 auto;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
    html[data-ios-app="true"] .gallery-page-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }
    html[data-ios-app="true"] .gallery-grid {
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    html[data-ios-app="true"] .gallery-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    html[data-ios-app="true"] .gallery-ibtn {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      aspect-ratio: auto;
    }
    html[data-ios-app="true"][data-gallery-orientation="landscape"] .gallery-grid {
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
    }
    html[data-ios-app="true"] .gallery-share-overlay {
      padding:
        max(16px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <header class="gallery-page-header">
    <div class="gallery-page-header-row">
      <h1 class="gallery-page-title">My Flickgames</h1>
      <button type="button" id="gallery-import-btn" class="gallery-btn">Import...</button>
    </div>
  </header>
  <main class="gallery-page-body">
    <div id="gallery-grid" class="gallery-grid"></div>
  </main>
  <div id="gallery-share-overlay" class="gallery-share-overlay" aria-hidden="true">
    <div id="gallery-share-sheet" class="gallery-share-sheet"></div>
  </div>
  <div id="gallery-toast" class="gallery-toast"></div>
  <input type="file" id="gallery-import-input" accept=".html,.json,.txt,text/plain" style="display:none">

  <script src="FileSaver.js"></script>
  <script src="gallery_store.js"></script>
  <script src="flickgame_share.js"></script>
  <script src="flickgame_vanilla.js"></script>
  <script src="gallery_page.js"></script>
</body>
</html>
