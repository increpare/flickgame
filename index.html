function rgbToLab(r,g,b) {
  r /= 255;
  g /= 255;
  b /= 255;
  r = (r > 0.04045) ? (((r + 0.055) / 1.055) ** 2.4) : r / 12.92;
  g = (g > 0.04045) ? (((g + 0.055) / 1.055) ** 2.4) : g / 12.92;
  b = (b > 0.04045) ? (((b + 0.055) / 1.055) ** 2.4) : b / 12.92;
  var x = (r * 0.4124 + g * 0.3576 + b * 0.1805) / 0.95047;
  var y = (r * 0.2126 + g * 0.7152 + b * 0.0722) / 1.00000;
  var z = (r * 0.0193 + g * 0.1192 + b * 0.9505) / 1.08883;
  x = (x > 0.008856) ? (x ** (1 / 3)) : (7.787 * x) + 16 / 116;
  y = (y > 0.008856) ? (y ** (1 / 3)) : (7.787 * y) + 16 / 116;
  z = (z > 0.008856) ? (z ** (1 / 3)) : (7.787 * z) + 16 / 116;
  return {
    L: (116 * y) - 16,
    a: 500 * (x - y),
    b: 200 * (y - z),
  };
}

  /** Shared hex-to-RGB parser. Validates with regex; returns { r, g, b } or { r:0, g:0, b:0 } for invalid input. */
  function hexToRgb(hex) {
    var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result
      ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) }
      : { r: 0, g: 0, b: 0 };
  }

  function color_distance(color1, color2) {
    var c1 = hexToRgb(color1);
    var c2 = hexToRgb(color2);
    // Convert to LAB
    var lab1 = rgbToLab(c1.r, c1.g, c1.b);
    var lab2 = rgbToLab(c2.r, c2.g, c2.b);

    // Calculate Delta E using the CIE76 formula
    const deltaL = lab1.L - lab2.L;
    const deltaA = lab1.a - lab2.a;
    const deltaB = lab1.b - lab2.b;

    return Math.sqrt(deltaL * deltaL + deltaA * deltaA + deltaB * deltaB);
  }

  function nearest_color_index_in_palette(palette,target_color){
      var nearest_color_idx = 0;
      var nearest_distance = color_distance(target_color, palette[0]);
      for (var i = 1; i < palette.length; i++){
        var distance = color_distance(target_color, palette[i]);
        if (distance < nearest_distance){
          nearest_distance = distance;
          nearest_color_idx = i;
        }
      }
      return nearest_color_idx;
    }

    function nearest_color_in_palette(palette,target_color){
      var nearest_color_idx = nearest_color_index_in_palette(palette,target_color);
      return palette[nearest_color_idx];
    }

    function find_palette_transformation(palettea,paletteb){
      //finds what colours in the second palette correspond most closely to those in the first palette - has to be a 1-1 mapping.
      var mapping = {};

      var colors_to_allocate = palettea.concat([]);
      var colors_to_target = paletteb.concat([]);
      while (colors_to_allocate.length > 0){
       //from all the pairs of colors colors_to_allocate,paletteb, find the pair with the least distance.
       var best_distance = Infinity;
       var best_pair = null;
       for (var i = 0; i < colors_to_allocate.length; i++){
        for (var j = 0; j < colors_to_target.length; j++){
          var distance = color_distance(colors_to_allocate[i], colors_to_target[j]);
          if (distance < best_distance){
            best_distance = distance;
            best_pair = [colors_to_allocate[i], colors_to_target[j]];
          }
        }
       }
       //remove best_match from colors_to_allocate
       colors_to_allocate.splice(colors_to_allocate.indexOf(best_pair[0]), 1);
       colors_to_target.splice(colors_to_target.indexOf(best_pair[1]), 1);
       mapping[palettea.indexOf(best_pair[0])] = paletteb.indexOf(best_pair[1]);
      }
      return mapping;
    }

    function apply_state_mapping(mapping){
      for (var i = 0; i < canvasses.length; i++){
        for (var j = 0; j < canvasses[i].length; j++){
          canvasses[i][j] = mapping[canvasses[i][j]];
        }
      }
      var old_hyperlinks = hyperlinks;
      hyperlinks = new Array(16);
      for (var page_idx = 0; page_idx < 16; page_idx++){
        var page_links = new Array(16).fill(0);
        var page_links_old = old_hyperlinks[page_idx];
        if (page_links_old && Array.isArray(page_links_old)) {
          for (var color_idx = 0; color_idx < page_links_old.length; color_idx++){
            page_links[mapping[color_idx]] = page_links_old[color_idx];
          }
        }
        hyperlinks[page_idx] = page_links;
      }

    }

    function transform_state(palette_before, palette_after){
      //need to transform canvasses and hyperlinks to the new palette.
      var mapping = find_palette_transformation(palette_before, palette_after);
      apply_state_mapping(mapping);

      //transform background_color
      var new_background_color = nearest_color_in_palette(palette_after, background_color);
      changeBackgroundColor(new_background_color);
    }

    var background_colors = {};
    //for each color-palette, find the darkest color and use it as the background color.

    function set_color_palette(name,preserver_undo_state = true){
      // if there is something on the undo stack, let's check if the previous one
      // was a change of colour palette
      // so that information doesn't get lost if you're changing palette rapidly
      if (undoList.length > 0){
        var previous_action = undoList[undoList.length - 1];

          doUndo();

        }

      for (let i=0;i<burgerBgSelectOptions.length;i++){

      for (var i = 0; i < 16; i++) {

    function revert_color_palette_to(p_name){
      var old_palette = palettes[p_name];
      var newer_palette = palettes[palette_name];
      var mapping = find_palette_transformation(old_palette, newer_palette);
      //invert the mapping
      var inverted_mapping = {};
      for (var key in mapping) {
        inverted_mapping[mapping[key]] = key;
      }
      apply_state_mapping(inverted_mapping);
      set_modal_panel_selected_item(palette_name,p_name);
      palette_name = p_name;
      colorPalette = palettes[p_name];

      // Update color swatches
      for (var i = 0; i < 16; i++) {
        document.documentElement.style.setProperty('--col' + i, colorPalette[i]);
      }

      // Set the background color properly
      if (background_colors[p_name]) {
        changeBackgroundColor(background_colors[p_name], false);
      }
    }

    function openPaletteSelector(evt){
      if (modal !== null) {
        closePaletteSelector();
        return;
      }
      // Create a modal dialog
      modal = document.createElement('div');
      modal.className = 'palette-modal';

      // Create grid container
      var grid = document.createElement('div');
      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(200px, 1fr))';
      grid.style.gap = '10px';

      // Add all palette previews
      for (var paletteName in palettes) {
        let currently_selected = paletteName === palette_name;
        let paletteDiv = document.createElement('div');
        paletteDiv.style.border = '1px solid var(--muted-foreground)';
        paletteDiv.style.padding = '5px';
        paletteDiv.style.cursor = 'pointer';

        // Add palette name
        let nameDiv = document.createElement('div');
        if (currently_selected){
          nameDiv.textContent = "[ "+paletteName+" ]";
          nameDiv.style.color = 'white';
        } else {
          nameDiv.textContent = paletteName;
        }
        nameDiv.style.marginBottom = '5px';
        nameDiv.style.textAlign = 'center';
        nameDiv.id = 'palette_name_' + Object.keys(palettes).indexOf(paletteName);
        paletteDiv.appendChild(nameDiv);

        // Add color previews
        let colorsDiv = document.createElement('div');
        colorsDiv.style.display = 'grid';
        colorsDiv.style.gridTemplateColumns = 'repeat(8, 1fr)';
        colorsDiv.style.gap = '2px';

        palettes[paletteName].forEach(function(color) {
          let colorDiv = document.createElement('div');
          colorDiv.style.width = '100%';
          colorDiv.style.paddingTop = '100%';
          colorDiv.style.backgroundColor = color;
          colorsDiv.appendChild(colorDiv);
        });

        paletteDiv.appendChild(colorsDiv);

        // Add click handler with proper closure
        (function(name) {
          paletteDiv.onclick = function() {
            if (name === palette_name){
              return;
            }
            //update nameDiv for previous and new item
            set_modal_panel_selected_item(palette_name, name);

            set_color_palette(name);
            setVisuals(true);
            saveFlickgameState();
          };
        })(paletteName);

        grid.appendChild(paletteDiv);
      }

      // Add elements to modal
      modal.appendChild(grid);

      // Add modal to body
      document.body.appendChild(modal);

      // Position relative to trigger button, clamped to window
      var pad = 8;
      var trigger = (evt && evt.currentTarget) ? evt.currentTarget : (document.getElementById('palette_button') || document.querySelector('a[onclick*="openPaletteSelector"]'));
      var rect = trigger ? trigger.getBoundingClientRect() : { top: pad, left: pad, bottom: pad + 40, right: pad + 40 };
      var mw = modal.offsetWidth;
      var mh = modal.offsetHeight;
      var winW = window.innerWidth;
      var winH = window.innerHeight;
      var gap = 4;
      // Prefer below, then right-aligned with button; if doesn't fit, try above or shift horizontal
      var top = rect.bottom + gap;
      var left = Math.min(rect.left, winW - pad - mw);
      if (left < pad) left = pad;
      if (top + mh > winH - pad) {
        top = rect.top - gap - mh;
        if (top < pad) top = pad;
      }
      if (top + mh > winH - pad) {
        modal.style.maxHeight = (winH - pad - top) + 'px';
      }
      modal.style.top = top + 'px';
      modal.style.left = left + 'px';

      //invert color of #palette_button using a transform
      var palette_button = document.getElementById('palette_button');
      if (palette_button) {
        palette_button.style.filter = 'invert(1)';
        palette_button.style.webkitFilter = 'invert(1)';
      }
    }

    function getAuthURL() {

      var authUrl = "https://github.com/login/oauth/authorize"

        + "&scope=gist"
        + "&state=" + randomState

    function RLE_encode(input) {
      var encoding = [];
      var prev, count, i;
      for (count = 1, prev = input[0], i = 1; i < input.length; i++) {
        if (input[i] != prev) {
          encoding.push(count);
          encoding.push(prev);
          count = 1;
          prev = input[i];
        }
        else
          count++;
      }
      encoding.push(count);
      encoding.push(prev);
      return encoding;
    }

    function stateToString() {
      var state = new Object();
      state.gameLink = gameLink;
      state.activeIndex = canvasIndex;
      state.canvasses = new Array();
      state.palette_name = palette_name;
      state.background_color = background_color;
      state.foreground_color = foreground_color;
      state.version = version;
      state.width = width;
      state.height = height;
      for (var i = 0; i < 16; i++) {
        var canvas = canvasses[i];
        var s = "";
        for (var j = 0; j < width * height; j++) {
          s += canvas[j].toString(16);
        }
        var pairs = RLE_encode(s);
        state.canvasses.push(pairs);
      }
      state.hyperlinks = hyperlinks;
      var result = JSON.stringify(state);
      return result;
    }

    function applyEditorDimensions() {
      if (visibleCanvas) {
        visibleCanvas.width = width * zoomFactor;
        visibleCanvas.height = height * zoomFactor;
      }
      for (var i = 0; i < 16; i++) {
        if (thumbnailCanvas[i]) {
          thumbnailCanvas[i].width = getThumbCols();
          thumbnailCanvas[i].height = getThumbRows();
        }
      }
    }

    function resizeCanvassesTo(newWidth, newHeight) {
      var oldWidth = width;
      var oldHeight = height;
      if (newWidth === oldWidth && newHeight === oldHeight) return;
      var bgIdx = nearest_color_index_in_palette(colorPalette, background_color);
      var copyW = Math.min(oldWidth, newWidth);
      var copyH = Math.min(oldHeight, newHeight);
      for (var i = 0; i < 16; i++) {
        var oldCanvas = canvasses[i];
        var newCanvas = new Uint8Array(newWidth * newHeight);
        for (var j = 0; j < newWidth * newHeight; j++) newCanvas[j] = bgIdx;
        for (var r = 0; r < copyH; r++) {
          for (var c = 0; c < copyW; c++) {
            newCanvas[c + newWidth * r] = oldCanvas[c + oldWidth * r];
          }
        }
        canvasses[i] = newCanvas;
      }
      width = newWidth;
      height = newHeight;
    }

    function updateMobileToolbarBottomScale() {
      var toolbar = document.querySelector('.mobile-toolbar-bottom');
      var content = document.querySelector('.mobile-toolbar-bottom-content');
      var maxControlSize = 100;
      var baseControlSize = 30;
      if (!toolbar || !content) return;

      content.style.setProperty('--mobile-toolbar-bottom-scale', '1');

      if (!isMobileLayout()) return;

      var toolbarStyle = window.getComputedStyle(toolbar);
      var availableWidth = toolbar.clientWidth - parseFloat(toolbarStyle.paddingLeft) - parseFloat(toolbarStyle.paddingRight);
      var availableHeight = toolbar.clientHeight - parseFloat(toolbarStyle.paddingTop) - parseFloat(toolbarStyle.paddingBottom);
      var naturalWidth = content.scrollWidth;
      var naturalHeight = content.scrollHeight;

      if (availableWidth <= 0 || availableHeight <= 0 || naturalWidth <= 0 || naturalHeight <= 0) return;

      var maxScale = maxControlSize / baseControlSize;
      var scaleByWidth = availableWidth / naturalWidth;
      var scaleByHeight = availableHeight / naturalHeight;
      var scale = layoutMode === 'mobile-portrait'
        ? Math.min(maxScale, scaleByWidth)
        : Math.min(maxScale, scaleByWidth, scaleByHeight);
      content.style.setProperty('--mobile-toolbar-bottom-scale', scale);
    }

    function updateMobileCanvasSize() {
      if (!isMobileLayout()) return;
      var container = document.getElementById('mobile-canvas-container');
      if (!container || !visibleCanvas) return;
      var rect = container.getBoundingClientRect();
      if (rect.width <= 0 || rect.height <= 0) return;
      var scaleW = rect.width / width;
      var scaleH = rect.height / height;
      var newZoom = Math.min(scaleW, scaleH);
      if (newZoom <= 0) return;
      if (newZoom !== zoomFactor) {
        zoomFactor = newZoom;
        if (typeof resetViewTransform === 'function') resetViewTransform();
        applyEditorDimensions();
        setVisuals(true);
      }
      updateMobileToolbarBottomScale();
    }

    function mobileFillCanvasSize() {
      if (!isMobileLayout()) return;
      var container = document.getElementById('mobile-canvas-container');
      if (!container) return;
      var rect = container.getBoundingClientRect();
      if (rect.width <= 0 || rect.height <= 0) return;
      var fillHeight = Math.max(50, Math.min(300, Math.floor(rect.height / (rect.width / 160))));
      resizeCanvassesTo(160, fillHeight);
      applyEditorDimensions();
      setVisuals(true);
    }

    function stringToState(str) {
      var state = JSON.parse(str);
      var stateWidth = state.width !== undefined ? state.width : 160;
      var stateHeight = state.height !== undefined ? state.height : 100;
      width = stateWidth;
      height = stateHeight;

      gameLink = state.gameLink;
      if (state.activeIndex === undefined){
        state.activeIndex = 0;
      }
      if (state.activeIndex >= 16){
        state.activeIndex = 0;
      }

      canvasIndex = state.activeIndex;

      //if palette_name not defined, set it to dawnbringer-16
      if (state.palette_name === undefined){
        state.palette_name = "dawnbringer-16";
      }

      //if version not defined, then I need to do the pallette_fix
      if (state.version === undefined){//only introduced version numbers in v2
        upgrade_v1_to_v2(state);
      }

      set_modal_panel_selected_item(palette_name,state.palette_name);
      palette_name = state.palette_name;
      set_color_palette(palette_name);

      foreground_color = state.foreground_color;
      changeBackgroundColor(state.background_color);

      canvasses = new Array();
      //trim state.canvasses to 16
      state.canvasses = state.canvasses.slice(0, 16);

      for (var k = 0; k < state.canvasses.length; k++) {
        var s = state.canvasses[k];
        var ar = new Uint8Array(stateWidth * stateHeight);
        var index = 0;
        for (var i = 0; i < s.length; i += 2) {
          var count = s[i];
          var ch = s[i + 1];
          for (var j = 0; j < count; j++) {
            ar[index] = parseInt(ch, 16);
            index++;
          }
        }
        canvasses.push(ar);
      }
      hyperlinks = state.hyperlinks;

      // Clear undo so we don't restore pre-load state (e.g. empty init) when undoing
      undoList.length = 0;
      if (visibleCanvas) applyEditorDimensions();
    }

    document.addEventListener("keydown", press);
    document.addEventListener("keyup", release);
    document.addEventListener("wheel", wheel);

    var copyImage = null;
    var copyLinks = null;

    function press(evt) {
      evt = evt || window.event;

      updateCursor(evt);
      if (evt.keyCode === 67) { //c
        doCopy();
      } else if (evt.keyCode === 86) { //v
        doPaste();
      } else if (evt.keyCode === 189 || evt.keyCode === 173) {//- minus
        var idx = BRUSH_SIZES.indexOf(radius);
        if (idx > 0) setRadius(BRUSH_SIZES[idx - 1]);
      } else if (evt.keyCode === 187 || evt.keyCode === 61) {//+ plus
        var idx = BRUSH_SIZES.indexOf(radius);
        if (idx >= 0 && idx < BRUSH_SIZES.length - 1) setRadius(BRUSH_SIZES[idx + 1]);
      } else if (evt.keyCode === 90) {//z
        doUndo();
      }
    }

    function wheel(evt) {
      var idx = BRUSH_SIZES.indexOf(radius);
      if (evt.deltaY < 0) {
        if (idx >= 0 && idx < BRUSH_SIZES.length - 1) setRadius(BRUSH_SIZES[idx + 1]);
      } else if (evt.deltaY > 0) {
        if (idx > 0) setRadius(BRUSH_SIZES[idx - 1]);
      }
    }

    function release(evt) {
      updateCursor(evt);
    }

    function doUndo() {
      if (undoList.length > 0) {
        var dat = undoList.pop();
        if (dat.palette_name!==palette_name){
          revert_color_palette_to(dat.palette_name);
          setVisuals(true);
          setDropdowns();
          showActionFeedback(['toolbar_undo', 'mobile-undo-btn'], 'Undo!');
          return;
        }
        canvasses[dat.canvasIndex] = dat.canvasDat;
        colorPalette = palettes[palette_name];
        if (background_color !== dat.background_color){
          changeBackgroundColor(dat.background_color,false);
        }
        setLayer(dat.canvasIndex + 1,true);
        saveFlickgameState();
        showActionFeedback(['toolbar_undo', 'mobile-undo-btn'], 'Undo!');

        if (shareLinkInner !== null) {
          shareLinkInner.style.color = "gray";
        }
      }
    }

    function showActionFeedback(ids, text) {
      for (var i = 0; i < ids.length; i++) {

        if (!el) continue;
        if (el.tagName === 'IMG') el = el.parentElement;

        el.style.position = 'relative';
        var existing = el.querySelector('.action-feedback');
        if (existing) existing.remove();
        var label = document.createElement('span');
        label.className = 'action-feedback';
        label.textContent = text;
        el.appendChild(label);
        (function(l) {
          setTimeout(function() { l.classList.add('fade-out'); }, 50);
          setTimeout(function() { l.remove(); }, 1200);

    function showCopyFeedback() {
      var thumbImg = document.getElementById('copy-thumb-img');
      var desktopThumbImg = document.getElementById('desktop-copy-thumb-img');
      if (thumbImg || desktopThumbImg) {
        var thumbCanvas = document.createElement('canvas');
        thumbCanvas.width = width;
        thumbCanvas.height = height;
        var ctx = thumbCanvas.getContext('2d');
        var src = canvasses[canvasIndex];
        for (var j = 0; j < height; j++) {
          for (var i = 0; i < width; i++) {
            ctx.fillStyle = colorPalette[src[i + width * j]];
            ctx.fillRect(i, j, 1, 1);
          }
        }
        var dataUrl = thumbCanvas.toDataURL();

        if (desktopThumbImg) desktopThumbImg.setAttribute('href', dataUrl);

    function getUsedColorsOnCurrentPage() {
      var used = new Set();
      if (canvasses[canvasIndex]) {
        var canvas = canvasses[canvasIndex];
        for (var k = 0; k < canvas.length; k++) used.add(canvas[k]);
      }
      return used;
    }

    function renderSwatches() {
      if (!colorElem.length) return;
      var used = getUsedColorsOnCurrentPage();
      for (var i = 0; i < 16; i++) {
        var swatch = colorElem[i];
        if (!swatch) continue;

        var label = swatch.querySelector('.link-label');
        var linkVal = hyperlinks[canvasIndex][i];
        var usedOnCurrentPage = used.has(i);
        var hasTarget = linkVal > 0;
        var targetOffPage = hasTarget && !usedOnCurrentPage;
        var dist_white = color_distance(colorPalette[i], "#ffffff");
        var dist_black = color_distance(colorPalette[i], "#000000");
        var contrastColor = dist_white > dist_black ? "#ffffff" : "#000000";
        var statusColor = SWATCH_LAYOUT_VARIANT === 'split' ? 'var(--foreground-color)' : contrastColor;
        var labelColor = '';

        swatch.classList.toggle('selected', i === colorIndex);
        swatch.classList.toggle('unselected', i !== colorIndex);
        swatch.classList.toggle('state-unused', !usedOnCurrentPage && !hasTarget);
        swatch.classList.toggle('state-used', usedOnCurrentPage && !hasTarget);
        swatch.classList.toggle('state-linked', usedOnCurrentPage && hasTarget);
        swatch.classList.toggle('state-linked-offpage', targetOffPage);
        swatch.style.color = statusColor;
        swatch.style.setProperty('--swatch-chip-indicator-color', contrastColor);

        if (!label) continue;
        if (hasTarget) {
          label.textContent = linkVal;
          if (targetOffPage) {
            label.classList.add('link-label-not-on-page');
          } else {
            label.classList.remove('link-label-not-on-page');
            labelColor = statusColor;
          }
        } else {
          label.textContent = '';
          label.classList.remove('link-label-not-on-page');
        }
        label.style.color = labelColor;
      }
    }

    function setDropdowns() {
      renderSwatches();

      var bg_color_idx = nearest_color_index_in_palette(colorPalette, background_color);
      bgColorSelect.value = bg_color_idx;
    }

    function createGenericPicker(type, onItemClick, options) {
      options = options || {};
      var onClearClick = options.onClearClick;
      var clearButtonText = options.clearButtonText || '\u2715 clear';
      var pickerId = options.pickerId;
      var dataAttr = type.replace('-picker', '');

      var picker = document.createElement('div');
      picker.className = type;
      if (pickerId) picker.id = pickerId;

      for (var i = 0; i < 16; i++) {
        var item = document.createElement('div');
        item.className = type + '-item';
        item.setAttribute('data-' + dataAttr, i + 1);

        var thumb = document.createElement('canvas');
        thumb.width = getThumbCols();
        thumb.height = getThumbRows();
        thumb.className = type + '-thumb';
        item.appendChild(thumb);

        var label = document.createElement('span');
        label.className = type + '-label';
        label.textContent = i + 1;
        item.appendChild(label);

        (function(idx) {
          item.addEventListener('click', function(e) {
            e.stopPropagation();
            onItemClick(e, idx);
          });
        })(i + 1);

        picker.appendChild(item);
      }

      if (onClearClick) {
        var clearBtn = document.createElement('div');
        clearBtn.className = type + '-clear';
        clearBtn.textContent = clearButtonText;
        clearBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          onClearClick(e);
        });
        picker.appendChild(clearBtn);
      }

      document.body.appendChild(picker);
      return picker;
    }

    function createPagePicker() {
      return createGenericPicker('page-picker', function(e, pageNum) {
        hyperlinks[canvasIndex][pagePickerColorIdx] = pageNum;
        hidePagePicker();
        renderSwatches();
        refreshPointerModeCursor();
        updateLayerItemNumberStyles();
        saveFlickgameState();
      }, {
        onClearClick: function(e) {
          hyperlinks[canvasIndex][pagePickerColorIdx] = 0;
          hidePagePicker();
          renderSwatches();
          refreshPointerModeCursor();
          updateLayerItemNumberStyles();
          saveFlickgameState();
        },
        clearButtonText: '\u2715 clear link'
      });

    var framePickerEl = null;
    function createFramePicker() {
      return createGenericPicker('frame-picker', function(e, frameNum) {
        setLayer(frameNum);
        hideFramePicker();
      }, { pickerId: 'frame-picker' });
    }

    function showFramePicker() {
      if (!framePickerEl) return;
      var tw = getThumbCols();
      var th = getThumbRows();
      for (var i = 0; i < 16; i++) {
        drawThumbnail(i);
        var item = framePickerEl.children[i];
        var thumb = item.querySelector('canvas');
        if (thumb && thumbnailCanvas[i]) {
          thumb.width = tw;
          thumb.height = th;
          var ctx = thumb.getContext('2d');
          ctx.drawImage(thumbnailCanvas[i], 0, 0);
        }
      }
      var btn = document.getElementById('mobile-frame-btn');
      if (btn) {
        var rect = btn.getBoundingClientRect();
        if (layoutMode === 'mobile-landscape') {
          framePickerEl.classList.add('visible');
          var pickerW = framePickerEl.offsetWidth;
          var pickerH = framePickerEl.offsetHeight;
          var left = rect.right + 8;
          if (left + pickerW > window.innerWidth - 8) left = window.innerWidth - pickerW - 8;
          if (left < 8) left = 8;
          var top = rect.bottom + 4;
          top = Math.max(8, Math.min(top, window.innerHeight - pickerH - 8));
          framePickerEl.style.left = left + 'px';
          framePickerEl.style.top = top + 'px';
        } else {
          framePickerEl.style.left = Math.max(8, rect.left) + 'px';
          framePickerEl.style.top = (rect.bottom + 4) + 'px';
        }
      }
      var reachable = getReachableFromStart();
      for (var i = 0; i < 16; i++) {
        var item = framePickerEl.children[i];
        if (!item) continue;
        item.classList.remove('frame-picker-item-empty', 'frame-picker-item-unreachable');
        var empty = isCanvasEmpty(i);
        var unreachable = !empty && !reachable.has(i);
        if (empty) item.classList.add('frame-picker-item-empty');
        else if (unreachable) item.classList.add('frame-picker-item-unreachable');
      }
      framePickerEl.classList.add('visible');
      updateMobileGridIconThumbnails();
      updateGridIconHighlight();
    }

    function hideFramePicker() {
      if (framePickerEl) framePickerEl.classList.remove('visible');
    }

    function isCanvasEmpty(idx) {
      var c = canvasses[idx];
      if (!c || !c.length) return true;
      var first = c[0];
      for (var i = 1; i < c.length; i++) if (c[i] !== first) return false;
      var links = hyperlinks[idx];
      if (!links) return true;
      for (var j = 0; j < links.length; j++) if (links[j] !== 0) return false;
      return true;
    }

    function isProjectBlank() {
      if (undoList.length > 0) return false;
      for (var i = 0; i < 16; i++) {
        if (!isCanvasEmpty(i)) return false;
      }
      return true;
    }

    function getReachableFromStart() {
      var reachable = new Set();
      var queue = [0];
      reachable.add(0);
      while (queue.length > 0) {
        var pageIdx = queue.shift();
        var links = hyperlinks[pageIdx];
        if (!links) continue;
        for (var c = 0; c < 16; c++) {
          var target = links[c];
          if (target >= 1 && target <= 16) {
            var idx = target - 1;
            if (!reachable.has(idx)) {
              reachable.add(idx);
              queue.push(idx);
            }
          }
        }
      }
      return reachable;
    }

    function updateLayerItemNumberStyles() {
      if (!layerElem || !layerElem[0]) return;
      var reachable = getReachableFromStart();
      for (var i = 0; i < 16; i++) {
        var el = layerElem[i];
        if (!el) continue;
        var empty = isCanvasEmpty(i);
        var unreachable = !empty && !reachable.has(i);
        var baseClass = "layerItem" + (i === canvasIndex ? " selectedItem" : "");
        if (empty) baseClass += " layerItemEmpty";
        else if (unreachable) baseClass += " layerItemUnreachable";
        el.setAttribute("class", baseClass);
      }
    }

    function updateGridIconHighlight() {
      var svg = document.getElementById('mobile-grid-icon');
      if (!svg) return;
      for (var i = 0; i < 16; i++) {
        var cell = document.getElementById('grid-cell-' + i);
        if (cell) {
          if (i === canvasIndex) {
            cell.classList.add('grid-cell-active');
            cell.classList.remove('grid-cell-empty');
          } else {
            cell.classList.remove('grid-cell-active');
            if (isCanvasEmpty(i)) cell.classList.add('grid-cell-empty');
            else cell.classList.remove('grid-cell-empty');
          }
        }
      }
      var activeBorder = document.getElementById('mobile-grid-active-border');
      if (activeBorder) {
        var col = canvasIndex % 4, row = Math.floor(canvasIndex / 4);
        activeBorder.setAttribute('x', 0.25 + col * 4);
        activeBorder.setAttribute('y', 0.25 + row * 4);
        activeBorder.setAttribute('width', 3.5);
        activeBorder.setAttribute('height', 3.5);
      }
    }

    function updateMobileGridIconThumbnails(onlyIndex) {
      if (!isMobileLayout()) return;
      var indices = onlyIndex !== undefined ? [onlyIndex] : [];
      if (indices.length === 0) {
        for (var i = 0; i < 16; i++) indices.push(i);
      }
      for (var k = 0; k < indices.length; k++) {
        var i = indices[k];
        var img = document.getElementById('mobile-grid-thumb-' + i);
        if (!img || !thumbnailCanvas[i]) continue;
        try {
          img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', thumbnailCanvas[i].toDataURL('image/png'));
        } catch (e) {}
      }
    }

    function showPagePicker(colorIdx) {
      if (!pagePickerEl) return;
      pagePickerColorIdx = colorIdx;

      // Update thumbnails in the picker
      var thumbs = pagePickerEl.querySelectorAll('.page-picker-thumb');
      for (var i = 0; i < 16; i++) {
        var ctx = thumbs[i].getContext('2d');
        ctx.drawImage(thumbnailCanvas[i], 0, 0);
      }

      // Highlight current target and apply layer state colours (empty / unreachable / reachable)
      var items = pagePickerEl.querySelectorAll('.page-picker-item');
      var currentTarget = hyperlinks[canvasIndex][colorIdx];
      var reachable = getReachableFromStart();
      for (var i = 0; i < 16; i++) {
        if (currentTarget > 0 && i === currentTarget - 1) {
          items[i].classList.add('current-target');
        } else {
          items[i].classList.remove('current-target');
        }
        items[i].classList.remove('page-picker-item-empty', 'page-picker-item-unreachable');
        var empty = isCanvasEmpty(i);
        var unreachable = !empty && !reachable.has(i);
        if (empty) items[i].classList.add('page-picker-item-empty');
        else if (unreachable) items[i].classList.add('page-picker-item-unreachable');
      }

      // Position relative to the swatch
      var swatchRect = colorElem[colorIdx].getBoundingClientRect();
      pagePickerEl.classList.add('visible');

      var pickerWidth = pagePickerEl.offsetWidth;
      var pickerHeight = pagePickerEl.offsetHeight;
      var left, top;

      if (layoutMode === 'mobile-landscape') {
        // Landscape mobile: open to the left of the swatch so it doesn't obscure it
        left = swatchRect.left - pickerWidth - 8;
        top = swatchRect.top + (swatchRect.height / 2) - (pickerHeight / 2);
      } else {
        // Other modes: centered below or above the swatch
        left = swatchRect.left + (swatchRect.width / 2) - (pickerWidth / 2);
        if (swatchRect.bottom + 4 + pickerHeight <= window.innerHeight - 8) {
          top = swatchRect.bottom + 4;
        } else {
          top = swatchRect.top - 4 - pickerHeight;
        }
      }

      // Keep on screen
      if (left + pickerWidth > window.innerWidth - 8) left = window.innerWidth - pickerWidth - 8;
      if (left < 8) left = 8;
      top = Math.max(8, Math.min(top, window.innerHeight - pickerHeight - 8));

      pagePickerEl.style.left = left + 'px';
      pagePickerEl.style.top = top + 'px';
    }

    function hidePagePicker() {
      if (pagePickerEl) {
        pagePickerEl.classList.remove('visible');
      }
      pagePickerColorIdx = -1;
    }

      var maxW = window.innerWidth - DESKTOP_SCALE_PADDING * 2;

    function drawPointerCursor() {
      if (!pointerMode || !ptrTouchMode || !ptrCursorVisible) return;

      var sprite, spriteW, spriteH, hotspotX;
      if (ptrHoveredIsLink && pointerHandSprite) {
        sprite = pointerHandSprite;
        spriteW = POINTER_HAND_W;
        spriteH = POINTER_HAND_H;
        hotspotX = 3;
      } else if (pointerArrowSprite) {
        sprite = pointerArrowSprite;

        spriteH = POINTER_ARROW_H;
        hotspotX = 0;
      } else {
        return;
      }

      var px = Math.floor(ptrCursorX);
      var py = Math.floor(ptrCursorY);
      var screenX = (px - hotspotX) * zoomFactor;
      var screenY = py * zoomFactor;

      var fillColor = '#ffffff';
      var outlineColor = '#000000';

      if (ptrHoveredIsLink && ptrHoveredColorIndex >= 0 && ptrHoveredColorIndex < 16) {

        var rgb = hexToRgb(fillColor);

        for (var x = 0; x < spriteW; x++) {
          var pixelType = sprite[y][x];
          if (pixelType === 0) continue;
          visibleContext.fillStyle = (pixelType === 1) ? fillColor : outlineColor;
          var rx = Math.floor(screenX + x * zoomFactor);
          var ry = Math.floor(screenY + y * zoomFactor);
          var rw = Math.floor(screenX + (x + 1) * zoomFactor) - rx;
          var rh = Math.floor(screenY + (y + 1) * zoomFactor) - ry;
          visibleContext.fillRect(rx, ry, rw, rh);
        }
      }
    }

          var contents = e.target.result;
          var fromToken = "<!--__EmbedBegin__-->";
          var endToken = "<!--__EmbedEnd__-->";
          var fromIndex = contents.indexOf(fromToken);
          var endIndex = contents.indexOf(endToken);
          var ss1 = contents.substr(fromIndex + fromToken.length, endIndex - fromIndex - fromToken.length);
          var ss2 = ss1.substr(ss1.indexOf("\"") + 1);
          var left_removed = decodeURI(ss2);
          // we want to find the location of the *final* double-quote, and to remove
          // everything after that.
          var final_quote_index = left_removed.lastIndexOf("\"");
          var left_right_removed = left_removed.substring(0, final_quote_index);
          loadAndDisplayState(left_right_removed);
        }
        r.readAsText(f);
      } else {
        alert("Failed to load file");

    function drawThumbnail(n) {

      thumbCtx = thumbnailContext[n];
      thumbCtx.fillStyle = "#FF0000";
      thumbCtx.fillRect(0, 0, thumbCols, thumbRows);
      var canvas = canvasses[n];
      for (var i = 0; i < thumbCols; i++) {
        for (var j = 0; j < thumbRows; j++) {
          var max = 0;
          for (var i2 = 0; i2 < blockW; i2++) {
            for (var j2 = 0; j2 < blockH; j2++) {
              var sample = canvas[(i * blockW + i2) + width * (j * blockH + j2)];
              if (sample > max) {
                max = sample;
              }
            }
          }
          thumbCtx.fillStyle = colorPalette[max];
          thumbCtx.fillRect(i, j, 1, 1);
        }
      }
    }

    function getCoords(e) {
      var target = e.target || e.srcElement;
      var rect = target.getBoundingClientRect();
      var x, y;
      if (e.touches && e.touches.length > 0) {
        x = 0;
        y = 0;
        for (var i = 0; i < e.touches.length; i++) {
          x += e.touches[i].clientX - rect.left;
          y += e.touches[i].clientY - rect.top;
        }
        x /= e.touches.length;
        y /= e.touches.length;
      } else {
        x = e.clientX - rect.left;
        y = e.clientY - rect.top;
      }
      if (target.width && target.height && rect.width > 0 && rect.height > 0) {
        x = x * (target.width / rect.width);
        y = y * (target.height / rect.height);
      }
      return [x, y];
    }

    /* Landscape mobile: same as portrait but rotated – portrait is 320×~160 (4 cols, 2:1 cells); rotated = 160 wide, full height */
    body[data-layout="mobile-landscape"] .mobile-swatch-grid {
      padding: 6px 4px 6px 6px;
      flex: 0 0 auto;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 148px;
      min-width: 148px;
      max-width: 148px;
      margin: 0;
      min-height: 0;
      overflow: hidden;
      box-sizing: border-box;
    }
    body[data-layout="mobile-landscape"] #mobile-swatch-grid #swatch-container {
      display: grid;
      grid-template-rows: repeat(4, minmax(0, 1fr));
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
      width: 100%;
      max-width: 100%;
      max-height: 100%;
      flex-shrink: 1;
      min-height: 0;
    }
    body[data-layout="mobile-landscape"] #mobile-swatch-grid #swatch-container > a {
      aspect-ratio: 1 / 2;
      min-height: 20px;
      max-height: 100%;
    }
    body[data-layout="mobile-landscape"] #mobile-swatch-grid #swatch-container.swatch-layout-split .swatch-button {
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr) auto minmax(0, 1fr);
      grid-template-areas:
        "status"
        "arrow"
        "chip";
      gap: 2px;
      align-items: stretch;
      justify-items: stretch;
    }
    body[data-layout="mobile-landscape"] #mobile-swatch-grid #swatch-container.swatch-layout-split .swatch-chip,
    body[data-layout="mobile-landscape"] #mobile-swatch-grid #swatch-container.swatch-layout-split .swatch-status {
      width: 100%;
      min-height: 0;
    }
    body[data-layout="mobile-landscape"] #mobile-swatch-grid #swatch-container.swatch-layout-split .swatch-chip {
      grid-area: chip;
    }
    body[data-layout="mobile-landscape"] #mobile-swatch-grid #swatch-container.swatch-layout-split .swatch-status {
      grid-area: status;
    }
    body[data-layout="mobile-landscape"] #mobile-swatch-grid #swatch-container.swatch-layout-split .swatch-arrow {
      grid-area: arrow;
      transform: rotate(-90deg);
      width: 12px;
      min-width: 12px;
      justify-self: center;
      align-self: center;
    }
    #burger-bg-select {
      height: 30px;
    }
  </style>

<body data-layout="desktop" onload="init();" ondragstart="return false;" ondrop="return false;">

                c.style.cssText = 'border:2px solid gray; background-color:transparent;';

                li.appendChild(a);
                ul.appendChild(li);

        </td>
        <td valign="top">

            <tr>

                              <defs><clipPath id="desktop-front-page-clip"><rect x="5" y="1" width="10" height="10" rx="1" ry="1"/></clipPath></defs>
                              <path fill="currentColor" d="M2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z"/>
                              <image id="desktop-copy-thumb-img" x="5" y="1" width="10" height="10" clip-path="url(#desktop-front-page-clip)" preserveAspectRatio="xMidYMid slice" style="image-rendering:pixelated;" href=""/>
                              <path fill="currentColor" fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1z"/>

                          <a href="#" onclick="confirmNewFlickgame();return false;"><img src="new_file.svg"

                              id="toolbar_new" /></a>
                        </span>
                      </center>
                    </td>
                  </tr>
                  <tr>
                    <td>

                      <a href="#" onclick="exportClick();return false;">&sdotb; export</a><br />
                      <a href="#" onclick="document.getElementById('my_file').click();return false;">&sdotb;

                      <div id="desktop-brush-slider-container">

                      </div>
                      <div class="tool-buttons vertical">
                        <a href="#" class="tool-btn" onclick="setRadius(0);return false;"><img src="bucket.svg" class="radius" id="bucket" /></a>
                        <a href="#" class="tool-btn" onclick="togglePointerMode();return false;"><img id="pointer_mode_btn" src="play.svg" class="radius" title="pointer mode (test links)" /></a>
                        <a href="#" class="tool-btn" id="desktop-clear-btn" onclick="clearPalette();return false;"><img src="clear.png" class="radius" title="clear frame" /></a>

  <div id="mobile-editor-wrapper">

      <button type="button" id="mobile-frame-btn" class="mobile-grid-tab" aria-label="Pages">
        <svg id="mobile-grid-icon" class="toolbar grid-icon-svg" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" alt="frame">
          <rect id="mobile-grid-active-border" x="0.25" y="0.25" width="3.5" height="3.5" fill="none" stroke="white" stroke-width="0.25"/>
        </svg>
        <script>
          (function() {
            var svg = document.getElementById('mobile-grid-icon');
            var border = document.getElementById('mobile-grid-active-border');
            var svgNS = 'http://www.w3.org/2000/svg';
            var xlinkNS = 'http://www.w3.org/1999/xlink';
            for (var i = 0; i < 16; i++) {
              var col = i % 4, row = Math.floor(i / 4);
              var cx = 0.25 + col * 4, cy = 0.25 + row * 4;
              var rect = document.createElementNS(svgNS, 'rect');
              rect.setAttribute('class', 'grid-cell');
              rect.id = 'grid-cell-' + i;
              rect.setAttribute('x', cx); rect.setAttribute('y', cy);
              rect.setAttribute('width', '3.5'); rect.setAttribute('height', '3.5');
              svg.insertBefore(rect, border);
              var img = document.createElementNS(svgNS, 'image');
              img.id = 'mobile-grid-thumb-' + i;
              img.setAttribute('x', cx); img.setAttribute('y', cy);
              img.setAttribute('width', '3.5'); img.setAttribute('height', '3.5');
              img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
              svg.insertBefore(img, border);
            }
          })();
        </script>
